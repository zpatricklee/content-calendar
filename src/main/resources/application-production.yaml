spring:
  datasource:
    url: "jdbc:postgresql://${systemEnvironment.PGHOST}:${systemEnvironment.PGPORT}/${systemEnvironment.PGDATABASE}"
    username: ${systemEnvironment.PGUSER}
    password: ${systemEnvironment.PGPASSWORD}
    hikari:
      data-source-properties:
        sslmode: require

  sql:
    init:
      mode: always

logging:
  level:
    org.springframework.boot.autoconfigure.jdbc: DEBUG